name: Build theme

# Auto-build on every update: pushes to main, version tags, PRs, or manual run.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-progress build when a newer commit lands on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build theme package
        run: npm run build:theme

      - name: Upload theme zip
        uses: actions/upload-artifact@v4
        with:
          name: komari-theme-kumo
          path: komari-theme-kumo.zip
          if-no-files-found: error

  # On a vX.Y.Z tag push, publish a GitHub Release with the packaged zip attached.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build theme package
        run: npm run build:theme

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" komari-theme-kumo.zip \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" komari-theme-kumo.zip --clobber
