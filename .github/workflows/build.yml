name: Build theme

# Auto-build on every update. Main pushes publish a rolling latest release;
# version tags publish immutable version releases.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel an in-progress build when a newer commit lands on the same ref.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build theme package
        run: npm run build:theme

      - name: Upload theme zip
        uses: actions/upload-artifact@v4
        with:
          name: komari-theme-kumo
          path: komari-theme-kumo.zip
          if-no-files-found: error

  latest-release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download theme zip
        uses: actions/download-artifact@v4
        with:
          name: komari-theme-kumo

      - name: Publish latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/latest" \
            --method PATCH \
            --field "sha=${GITHUB_SHA}" \
            --field "force=true" \
          || gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            --method POST \
            --field "ref=refs/tags/latest" \
            --field "sha=${GITHUB_SHA}"

          gh release create latest komari-theme-kumo.zip \
            --title "Latest build" \
            --notes "Automated build from ${GITHUB_SHA}." \
            --target "$GITHUB_SHA" \
            --prerelease \
          || {
            gh release edit latest \
              --title "Latest build" \
              --notes "Automated build from ${GITHUB_SHA}." \
              --prerelease
            gh release upload latest komari-theme-kumo.zip --clobber
          }

  version-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download theme zip
        uses: actions/download-artifact@v4
        with:
          name: komari-theme-kumo

      - name: Publish version release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" komari-theme-kumo.zip \
            --title "$GITHUB_REF_NAME" --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" komari-theme-kumo.zip --clobber
